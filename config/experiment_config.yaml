experiments:
  max_trajectories: 50
  compression_ratios: [2.0, 5.0, 10.0, 20.0]
  algorithms:
    - original
    - dp
    - squish
    - vw
    - sw
    - rw
    - greedy_policy
    - proposed
  
  algorithm_params:
    greedy_policy:
      alpha: 0.5
    proposed:
      weights:
        turn: 0.3
        stop: 0.3
        speed: 0.2
        irregular: 0.2

dataset:
  data_file: "data/processed/trajectories.pkl"
  min_points: 100
  max_points: 5000

output:
  results_dir: "results"
  figures_dir: "results/figures"
  tables_dir: "results/tables"

reproducibility:
  seed: 42
